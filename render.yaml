services:
  - type: web
    name: pitcher-overlayer
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: pitcher-overlayer-jobs
      mountPath: /app/jobs
      sizeGB: 5
